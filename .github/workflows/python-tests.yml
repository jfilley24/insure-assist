name: Python Tests (Pytest)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        cache-dependency-glob: "front-desk-telephony/uv.lock"

    - name: "Set up Python"
      uses: actions/setup-python@v5
      with:
        python-version-file: "front-desk-telephony/.python-version"

    - name: Install Dependencies
      run: |
        cd front-desk-telephony
        uv sync --dev

    - name: Preflight Syntax and Tooling Tests
      run: |
        cd front-desk-telephony
        uv run pytest
